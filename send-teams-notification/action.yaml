name: "Send Teams Notification"
description: "Send a formatted release notification to Microsoft Teams via webhook"
inputs:
  webhook-url:
    description: "Teams webhook URL"
    required: true
  release-name:
    description: "Release name/version"
    required: true
  release-tag:
    description: "Release tag"
    required: true
  cleaned-patches:
    description: "Formatted patches section"
    required: true
  cleaned-full_changelog:
    description: "Full changelog URL"
    required: true
  repo_name:
    description: "Repository name"
    required: false
    default: "Unknown"

runs: 
  using: "composite"
  steps:
    - name: Send Release Notes to Teams
      shell: bash
      env:
        RELEASE_NAME:           ${{ inputs.release-name }}
        RELEASE_TAG:            ${{ inputs.release-tag }}
        REPO_NAME:              ${{ inputs.repo_name }}
        CLEANED_PATCHES:        ${{ inputs.cleaned-patches }}
        CLEANED_FULL_CHANGELOG: ${{ inputs.cleaned-full_changelog }}
        WEBHOOK_URL:            ${{ inputs.webhook-url }}
      run: |
        PAYLOAD=$(printf '{
          "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
          "type": "AdaptiveCard",
          "version": "1.4",
          "body": [
            {
              "type": "TextBlock",
              "text": "🚀 New Production Release %s Deployed",
              "weight": "Bolder",
              "size": "Large"
            },
            {
              "type": "TextBlock",
              "text": "[View Release](https://github.com/BenGumaan/%s/releases/tag/%s)",
              "weight": "default"
            },
            {
              "type": "TextBlock",
              "text": "📌 Release Notes:",
              "weight": "Bolder"
            },
            {
              "type": "FactSet",
              "facts": [
                {
                    "title": "📦 Repo Name",
                    "value": "%s"
                },
              ]
            },
            {
              "type": "TextBlock",
              "text": "🩹 Patches",
              "weight": "Bolder"
            },
            {
              "type": "ColumnSet",
              "columns": [
                {
                  "type": "Column",
                  "width": "stretch",
                  "items": [
                    { "type": "TextBlock", "text": "%s", "wrap": true }
                  ]
                }
              ]
            },
            {
              "type": "TextBlock",
              "text": "🔗 **Full Changelog**: [Click Here](%s)",
              "wrap": true
            }
          ]
        }' "$RELEASE_NAME" "$REPO_NAME" "$RELEASE_TAG" "$REPO_NAME" "$CLEANED_PATCHES" "$CLEANED_FULL_CHANGELOG")

        RESPONSE=$(curl -s -w "\n%{http_code}" \
          --max-time 10 \
          --connect-timeout 5 \
          -X POST "$WEBHOOK_URL" \
          -H "Content-Type: application/json" \
          --data-binary "$PAYLOAD")

        BODY=$(echo "$RESPONSE" | head -n -1)
        STATUS=$(echo "$RESPONSE" | tail -n 1)

        echo "HTTP Status: $STATUS"
        echo "Response body: $BODY"
        echo "STATUS=$STATUS" >> $GITHUB_ENV

    - name: Verify Teams Response
      shell: bash
      run: |
        if [ "$STATUS" != "200" ] && [ "$STATUS" != "201" ] && [ "$STATUS" != "202" ]; then
          echo "❌ Teams webhook failed with status: $STATUS"
          exit 1
        fi
        echo "✅ Teams notification sent successfully"
